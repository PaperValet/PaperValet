name: Build and Release External Plugins

on:
  push:
    tags:
      - 'plugins/**'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to build (or "all")'
        required: true
        default: 'all'

jobs:
  build-plugins:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin:
          - ping
          - leech
          - qrcode
          - bf
          - re
          - sendlog
          - tpm
        include:
          - plugin: ping
            path: plugins-external/ping
          - plugin: leech
            path: plugins-external/leech
          - plugin: qrcode
            path: plugins-external/qrcode
          - plugin: bf
            path: plugins-external/bf
          - plugin: re
            path: plugins-external/re
          - plugin: sendlog
            path: plugins-external/sendlog
          - plugin: tpm
            path: plugins-external/tpm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install PaperValet dependency
        run: |
          go mod download github.com/TiaraBasori/PaperValet

      - name: Build plugin
        run: |
          cd ${{ matrix.path }}
          go mod edit -replace github.com/TiaraBasori/PaperValet=${{ github.workspace }}
          go mod tidy
          go build -buildmode=plugin -o ../../build/plugins/${{ matrix.plugin }}.so .

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin }}-plugin
          path: build/plugins/${{ matrix.plugin }}.so
          retention-days: 30

  release:
    needs: build-plugins
    if: startsWith(github.ref, 'refs/tags/plugins/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: build/plugins

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/plugins/**/*.so
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}